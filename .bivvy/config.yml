# Bivvy configuration for bivvy
# Docs: https://bivvy.dev/configuration
#
# Override any template field per-step:
#   steps:
#     example:
#       template: bundle-install
#       env:
#         BUNDLE_WITHOUT: "production"
#
# Add custom steps:
#   steps:
#     setup_db:
#       title: "Set up database"
#       command: "bin/rails db:setup"
#       completed_check:
#         type: command_succeeds
#         command: "bin/rails db:version"
#
# Create named workflows:
#   workflows:
#     ci:
#       steps: [bundle-install, yarn-install]
#       settings:
#         default_output: quiet

app_name: "bivvy"

settings:
  default_output: verbose  # verbose | quiet | silent

vars:
  version:
    command: "grep '^version = ' Cargo.toml | head -1 | sed 's/version = \"\\(.*\\)\"/\\1/'"

steps:
  rust:
    title: "Rust toolchain"
    command: "rustup show active-toolchain"
    completed_check:
      type: command_succeeds
      command: "rustc --version"

  clippy:
    title: "Clippy"
    command: "rustup component add clippy"
    depends_on: [rust]
    completed_check:
      type: command_succeeds
      command: "cargo clippy --version"

  rustfmt:
    title: "Rustfmt"
    command: "rustup component add rustfmt"
    depends_on: [rust]
    completed_check:
      type: command_succeeds
      command: "cargo fmt --version"

  llvm-cov:
    title: "cargo-llvm-cov"
    command: "cargo install cargo-llvm-cov"
    depends_on: [rust]
    completed_check:
      type: command_succeeds
      command: "cargo llvm-cov --version"

  cargo-edit:
    title: "cargo-edit"
    command: "cargo install cargo-edit"
    depends_on: [rust]
    completed_check:
      type: command_succeeds
      command: "cargo set-version --version"

  deps:
    title: "Cargo dependencies"
    command: "cargo fetch"
    depends_on: [rust]
    watches: [Cargo.toml, Cargo.lock]

  build:
    template: cargo-build
    depends_on: [deps]

  test:
    title: "Tests"
    command: "cargo test --all-features"
    depends_on: [build]

  lint:
    title: "Lint"
    command: "cargo fmt -- --check && cargo clippy --all-targets --all-features -- -D warnings"
    depends_on: [clippy, rustfmt, build]

  coverage:
    title: "Coverage"
    command: "cargo llvm-cov --all-features --fail-under-lines 90"
    depends_on: [llvm-cov, build]

  version-bump:
    title: "Bump version"
    template: version-bump
    depends_on: [cargo-edit]
    prompts:
      - key: bump
        question: "Version bump type"
        type: select
        options:
          - label: "Patch (x.y.Z)"
            value: patch
          - label: "Minor (x.Y.0)"
            value: minor
          - label: "Major (X.0.0)"
            value: major

  version-commit:
    title: "Commit version bump"
    depends_on: [version-bump]
    completed_check:
      type: command_succeeds
      command: "git diff --quiet Cargo.toml && git diff --quiet Cargo.lock"
    command: |
      VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
      git add Cargo.toml Cargo.lock && git commit -m "Bump version to $${VERSION}"

  release-preflight:
    title: "Release preflight"
    depends_on: [version-commit]
    precondition:
      type: all
      checks:
        - type: command_succeeds
          command: "test $(git branch --show-current) = main"
        - type: command_succeeds
          command: "git diff --quiet && git diff --cached --quiet"
        - type: command_succeeds
          command: "! git rev-parse $(grep '^version = ' Cargo.toml | head -1 | sed 's/version = \"\\(.*\\)\"/\\1/') >/dev/null 2>&1"
    command: |
      VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
      echo "Ready to release $${VERSION}"

  release-tag:
    title: "Tag and push release"
    command: |
      VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
      git tag "$${VERSION}" && git push origin main && git push origin "$${VERSION}"
    depends_on: [release-preflight, lint, test, build]

workflows:
  default:
    steps: [rust, clippy, rustfmt, deps, build, test, lint]

  setup:
    description: "First-time setup (includes cargo-llvm-cov)"
    steps: [rust, clippy, rustfmt, llvm-cov, cargo-edit, deps, build, test, lint]

  check:
    description: "Pre-commit verification"
    steps: [lint, test, build]

  release:
    description: "Tag and push a release (replaces bin/release)"
    steps: [cargo-edit, version-bump, version-commit, release-preflight, rust, clippy, rustfmt, deps, build, lint, test, release-tag]

  ci:
    description: "CI pipeline"
    steps: [rust, clippy, rustfmt, llvm-cov, deps, build, lint, coverage]
    settings:
      non_interactive: true
