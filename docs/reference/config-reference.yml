# ============================================================================
# Bivvy Configuration Reference
# ============================================================================
#
# This file documents every configurable field in .bivvy/config.yml.
# Copy sections you need — most fields are optional with sensible defaults.
#
# File locations (merged in order, later overrides earlier):
#   1. Remote base configs (from `extends:`)
#   2. User global config (~/.bivvy/config.yml)
#   3. Project config (.bivvy/config.yml)
#   4. Local overrides (.bivvy/config.local.yml) — gitignored
#
# Variable interpolation: use ${VAR} syntax anywhere.
#   Priority (highest to lowest):
#     1. Prompt values from current run
#     2. Saved preferences from previous runs
#     3. User-defined variables (vars:)
#     4. Environment variables (${HOME}, ${RAILS_ENV}, etc.)
#     5. Built-in variables (${project_name}, ${project_root}, ${bivvy_version})
#   Escape: $${NOT_INTERPOLATED} outputs literal ${NOT_INTERPOLATED}
#
# ============================================================================


# --------------------------------------------------------------------------
# App Name
# --------------------------------------------------------------------------
# Display name for your project. Shown in TUI header and logs.
# Type: string (optional)
app_name: "MyApp"


# --------------------------------------------------------------------------
# Settings — global defaults for all workflows
# --------------------------------------------------------------------------
settings:

  # Write logs to a file
  # Default: false
  logging: false

  # Log file path (relative to project root)
  # Only used when logging: true
  # Type: path (optional)
  log_path: "logs/bivvy.log"

  # Global environment variables — available to all steps
  # Type: map of string → string
  env:
    RAILS_ENV: development
    DEBUG: "true"

  # Load environment variables from a file
  # Type: path (optional)
  env_file: .env

  # Additional patterns to mask in output (added to built-in patterns)
  # Built-in patterns: *_KEY, *_SECRET, *_TOKEN, *_PASSWORD, *_CREDENTIALS
  # Type: list of strings
  secret_env:
    - CUSTOM_API_KEY
    - MY_SECRET_HEADER

  # Enable parallel step execution
  # Default: false
  parallel: false

  # Maximum concurrent steps when parallel: true
  # Default: 4
  max_parallel: 4

  # Number of execution history entries to retain
  # Default: 50
  history_retention: 50

  # Default environment when --env is not provided and auto-detection
  # doesn't match. Omit to fall back to auto-detect → "development".
  # Type: string (optional)
  # default_environment: staging

  # Custom environments — detection rules, default workflows, provided reqs
  # Type: map (optional)
  # environments:
  #   staging:
  #     # Auto-detection rules — any match triggers this environment
  #     detect:
  #       - env: DEPLOY_ENV
  #         value: staging       # Optional: omit to match on presence
  #     # Workflow to run by default in this environment
  #     default_workflow: staging
  #     # Requirements assumed satisfied (skip gap checks)
  #     provided_requirements:
  #       - postgres-server
  #       - redis-server
  #   review_app:
  #     detect:
  #       - env: REVIEW_APP
  #     provided_requirements:
  #       - docker

  # Default values for step behavior flags.
  # Step-level settings override these; workflow step_overrides override step-level.
  # Type: map (optional)
  defaults:

    # Output verbosity: verbose | quiet | silent
    # Override per-run with --verbose, --quiet, or --silent
    # Default: verbose
    output: verbose

    # Whether steps auto-run when the pipeline determines they need to run.
    # When false, the user is prompted "Run <step>?" before each step executes.
    # Default: true
    auto_run: true

    # Whether to prompt before re-running a step completed within the rerun window.
    # When false, recently-completed steps are silently skipped.
    # Default: false
    prompt_on_rerun: false

    # Default rerun window for all steps (how long a previous success counts as recent).
    # Steps override with their own rerun_window field.
    # Accepts: "4h", "30m", "7d", "0"/"never", "forever"
    # Default: "4h"
    rerun_window: "4h"


# --------------------------------------------------------------------------
# Vars — user-defined variables for interpolation
# --------------------------------------------------------------------------
# Define reusable values available via ${var_name} in any command.
# Static vars are plain strings; computed vars run a shell command at
# workflow start and use the trimmed stdout.
# Type: map (optional)
vars:
  # Static variable — plain string value
  app_name: "myapp"

  # Computed variable — shell command whose stdout becomes the value
  version:
    command: "grep '^version' Cargo.toml | head -1 | cut -d'\"' -f2"

  git_sha:
    command: "git rev-parse --short HEAD"


# --------------------------------------------------------------------------
# Extends — inherit from remote base configs
# --------------------------------------------------------------------------
# Fetched and merged before local config. Useful for org-wide defaults.
# Type: list (optional)
# --------------------------------------------------------------------------
# Requirements — custom system-level prerequisites
# --------------------------------------------------------------------------
# Define requirements not in the built-in registry.
# Type: map (optional)
#
# requirements:
#   elasticsearch:
#     check:
#       type: service_reachable
#       command: "curl -sf http://localhost:9200/_cluster/health"
#     install_hint: "Install Elasticsearch: https://elastic.co/downloads"
#   graphviz:
#     check:
#       type: command_succeeds
#       command: "dot -V"
#     install_template: brew-install
#     install_hint: "brew install graphviz"


extends:
  - url: https://example.com/team-bivvy-config.yml


# --------------------------------------------------------------------------
# Template Sources — remote template registries
# --------------------------------------------------------------------------
# Additional template sources beyond the built-in registry. Bivvy supports
# two kinds: HTTP (a single YAML file or list of templates) and Git (clone a
# repository and walk a templates directory).
# Type: list (optional)
template_sources:
  # Example 1 — HTTP source (auto-detected from URL).
  - url: https://example.com/templates.yml
    # Priority: lower number = higher priority
    # Default: 100
    priority: 50
    # Network timeout in seconds
    # Default: 30
    timeout: 30
    # Cache configuration
    cache:
      # Time-to-live: e.g., "7d", "24h", "1h"
      ttl: "7d"
      # Cache strategy: etag | git
      # Default: etag
      strategy: etag
    # Authentication for private registries
    auth:
      # Auth type: bearer | header
      type: bearer
      # Environment variable containing the token
      token_env: GITHUB_TOKEN
      # Custom header name (only for type: header)
      # header: X-Custom-Auth

  # Example 2 — Git source. Auto-detected from `git@`/`ssh://`/`git://`
  # URLs and from URLs ending in `.git`. Use `type: git` to force.
  - type: git
    url: https://github.com/myorg/bivvy-templates.git
    # Branch, tag, or commit SHA to clone. Default: HEAD.
    ref: main
    # Subdirectory within the repository to walk for *.yml templates.
    # Defaults to the repository root.
    # path: templates/
    priority: 60


# --------------------------------------------------------------------------
# Secrets — external secret providers
# --------------------------------------------------------------------------
# Fetch secrets from external sources (Vault, 1Password, etc.)
# The command stdout becomes the secret value.
# Type: map (optional)
secrets:
  database_url:
    command: "vault read -field=url secret/myapp/database"
  api_key:
    command: "op read 'op://MyVault/API Key/credential'"


# --------------------------------------------------------------------------
# Steps — the building blocks
# --------------------------------------------------------------------------
# Each step is a named task. Steps can be defined inline or reference
# a template from the registry.
#
# At minimum, a step needs either `command:` or `template:`.
steps:

  # === Inline step (all fields shown) ===
  install_deps:
    # Display title (shown in TUI and logs)
    # Type: string (optional — defaults to step key)
    title: "Install dependencies"

    # Human-readable description
    # Type: string (optional)
    description: "Install Node.js dependencies from package.json"

    # Shell command to execute
    # Supports ${variable} interpolation
    # Type: string (required unless using template)
    command: "npm install"

    # Steps that must complete before this one runs
    # Type: list of step names
    depends_on:
      - check_node

    # --- Checks ---
    # Satisfaction and change-detection checks (enables idempotent re-runs)
    # Types: presence, execution, change, all, any
    checks:
      - type: presence
        target: node_modules
      - type: change
        target: package.json
        on_change: proceed
      - type: change
        target: "package-lock.json"
        on_change: proceed

    # --- Precondition ---
    # Gate that must pass before the step runs.
    # Uses the same check types as checks, but with opposite
    # semantics: a failing precondition fails the step (hard stop).
    # --force does NOT bypass preconditions.
    # Type: Check (optional)
    # precondition:
    #   type: execution
    #   command: "test $(git branch --show-current) = main"
    #   validation: success

    # --- Execution Control ---
    # Whether user can skip this step interactively
    # Default: true
    skippable: true

    # Step must run — cannot be skipped
    # Default: false
    required: false

    # Whether this step auto-runs when the pipeline says it needs to run.
    # Omit to use the global default (settings.defaults.auto_run).
    # Set to false to prompt "Run <step>?" before executing.
    # Type: bool (optional — omit to use global default)
    # auto_run: true

    # Ask before re-running a step that's already complete
    # Default: false
    prompt_on_rerun: false

    # Continue the workflow even if this step fails
    # Default: false
    allow_failure: false

    # Number of retry attempts on failure
    # Default: 0
    retry: 0

    # --- Environment ---
    # Step-specific environment variables (merged with global settings.env)
    env:
      NODE_ENV: development
      CI: "true"

    # Load env vars from a file for this step
    # Type: path (optional)
    env_file: .env.development

    # Don't fail if env_file is missing
    # Default: false
    env_file_optional: false

    # Required environment variables — step fails if any are missing
    # Type: list of variable names
    required_env:
      - NODE_AUTH_TOKEN

    # --- Interactive Prompts ---
    # Collect user input before running the step
    prompts:
      - key: env_name
        question: "Which environment?"
        type: select      # select | multiselect | confirm | input
        options:
          - label: "Development"
            value: development
          - label: "Production"
            value: production
        default: development

    # --- Output Control ---
    # Override output settings for this step
    output:
      # Output mode: verbose | quiet | silent
      default: verbose
      # Enable logging for this step (overrides settings.logging)
      logging: true

    # --- Security ---
    # Mark step as handling sensitive data
    # Hides command in dry-run, suppresses output, skips history
    # Default: false
    sensitive: false

    # Step requires sudo/elevated permissions
    # Bivvy will warn and prompt before running
    # Default: false
    requires_sudo: false

    # --- Hooks ---
    # Commands to run before the step executes
    before:
      - "echo 'Starting install...'"

    # Commands to run after the step succeeds
    after:
      - "echo 'Install complete!'"

    # --- Requirements ---
    # System-level prerequisites that must be available before running
    # Names can be built-in (ruby, node, docker, etc.) or custom
    # Type: list of strings
    requires:
      - node

    # --- Environment Filtering ---
    # Restrict this step to specific environments
    # Empty list (default) means run in all environments
    # Type: list of strings
    # only_environments:
    #   - development
    #   - staging

    # --- Per-Environment Overrides ---
    # Override step fields for specific environments
    # Only specified fields override the base — everything else inherits
    # Type: map of environment name → overrides
    # environments:
    #   ci:
    #     command: "npm ci"
    #     env:
    #       NODE_ENV: test
    #       CI: "true"
    #   docker:
    #     env:
    #       NODE_ENV: null  # Remove NODE_ENV in Docker

  # === Template-based step ===
  ruby_deps:
    # Reference a template from the registry
    # Type: string (template name)
    template: bundle-install

    # Pass inputs to the template
    # Available inputs depend on the template
    inputs:
      deployment: true
      without: "test development"

    # Override any template-provided field
    command: "bundle install --jobs 4"


# --------------------------------------------------------------------------
# Check Types — detailed examples
# --------------------------------------------------------------------------
# These go inside a step's `checks:` list.
#
# --- presence ---
# check:
#   type: presence
#   target: node_modules          # relative to project root
#
# --- execution ---
# check:
#   type: execution
#   command: "bundle check"       # exit 0 = complete
#   validation: success
#
# --- change ---
# check:
#   type: change
#   target: package.json
#   on_change: proceed
#
# --- all (every check must pass) ---
# check:
#   type: all
#   checks:
#     - type: presence
#       target: node_modules
#     - type: execution
#       command: "node --version"
#       validation: success
#
# --- any (at least one check must pass) ---
# check:
#   type: any
#   checks:
#     - type: presence
#       target: .setup-complete
#     - type: execution
#       command: "psql -c 'SELECT 1'"
#       validation: success


# --------------------------------------------------------------------------
# Workflows — orchestrate step execution
# --------------------------------------------------------------------------
# Named sequences of steps. `default` runs when you type `bivvy` with
# no arguments. Run others with `bivvy run <workflow-name>`.
workflows:

  default:
    # Human-readable description
    # Type: string (optional)
    description: "Full development setup"

    # Ordered list of step names to execute
    # Type: list of strings (required)
    steps:
      - install_deps
      - ruby_deps

    # Override step behavior within this workflow
    # Type: map of step name → overrides
    overrides:
      install_deps:
        # Skip interactive prompts, just run
        # Default: false
        skip_prompt: false
        # Override the step's `required` flag
        # Type: bool (optional — omit to use step default)
        required: true
        # Override the step's `auto_run` flag
        # Type: bool (optional — omit to use step default)
        # auto_run: true
        # Override the step's `prompt_on_rerun` flag
        # Type: bool (optional — omit to use step default)
        prompt_on_rerun: false

    # Override auto_run for all steps in this workflow.
    # Individual step overrides take precedence.
    # Type: bool (optional)
    # auto_run_steps: true

    # Workflow-level settings
    settings:
      # Force non-interactive mode for this workflow
      # Default: false
      non_interactive: false

    # Workflow-level environment variables (merged with settings.env)
    env:
      SETUP_MODE: full

    # Workflow-level env file
    # Type: path (optional)
    env_file: .env.setup

  ci:
    description: "CI setup (no prompts)"
    steps:
      - install_deps
      - ruby_deps
    settings:
      non_interactive: true


# --------------------------------------------------------------------------
# Prompt Types — detailed examples
# --------------------------------------------------------------------------
# These go inside a step's `prompts:` list.
#
# --- select (pick one) ---
# - key: database
#   question: "Which database?"
#   type: select
#   options:
#     - label: PostgreSQL
#       value: postgres
#     - label: MySQL
#       value: mysql
#   default: postgres
#
# --- multiselect (pick many) ---
# - key: features
#   question: "Enable which features?"
#   type: multiselect
#   options:
#     - label: Redis caching
#       value: redis
#     - label: Background jobs
#       value: sidekiq
#
# --- confirm (yes/no) ---
# - key: seed_data
#   question: "Seed the database?"
#   type: confirm
#   default: true
#
# --- input (free text) ---
# - key: app_port
#   question: "Which port?"
#   type: input
#   default: "3000"
