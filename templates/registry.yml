version: 1

categories:
  - name: system
    description: "System-level package managers"
    templates: [brew, apt, yum, pacman]

  - name: windows
    description: "Windows package managers"
    templates: [chocolatey, scoop]

  - name: version_manager
    description: "Runtime version managers"
    templates: [mise, asdf, volta]

  - name: ruby
    description: "Ruby ecosystem tools"
    templates: [bundler]

  - name: node
    description: "Node.js ecosystem tools"
    templates: [yarn, npm, pnpm, bun]

  - name: python
    description: "Python ecosystem tools"
    templates: [pip, poetry, uv]

  - name: rust
    description: "Rust ecosystem tools"
    templates: [cargo, version-bump]

  - name: go
    description: "Go ecosystem tools"
    templates: [go]

  - name: php
    description: "PHP ecosystem tools"
    templates: [composer, laravel]

  - name: swift
    description: "Swift ecosystem tools"
    templates: [swift]

  - name: gradle
    description: "Gradle/JVM ecosystem tools"
    templates: [gradle]

  - name: elixir
    description: "Elixir ecosystem tools"
    templates: [mix]

  - name: iac
    description: "Infrastructure as Code tools"
    templates: [terraform, aws-cdk]

  - name: java
    description: "Java ecosystem tools"
    templates: [maven]

  - name: dotnet
    description: ".NET ecosystem tools"
    templates: [dotnet]

  - name: dart
    description: "Dart/Flutter ecosystem tools"
    templates: [dart, flutter]

  - name: deno
    description: "Deno ecosystem tools"
    templates: [deno]
  - name: iac
    description: "Infrastructure as Code tools"
    templates: [pulumi, ansible]

  - name: containers
    description: "Container and orchestration tools"
    templates: [docker-compose, helm]

  - name: install
    description: "Prerequisite installation templates"
    templates:
      - mise-install
      - mise-ruby
      - mise-node
      - mise-python
      - mise-php
      - mise-elixir
      - asdf-ruby
      - asdf-node
      - asdf-python
      - asdf-php
      - asdf-elixir
      - nvm-node
      - volta-node
      - rbenv-ruby
      - pyenv-python
      - brew-ruby
      - brew-node
      - brew-python
      - brew-php
      - brew-elixir
      - brew-go
      - brew-install
      - rust-install
      - postgres-install
      - redis-install
      - docker-install

detection_order:
  - brew
  - chocolatey
  - apt
  - yum
  - pacman
  - scoop
  - mise
  - asdf
  - volta
  - bundler
  - yarn
  - npm
  - pnpm
  - bun
  - poetry
  - uv
  - pip
  - composer
  - laravel
  - gradle
  - mix
  - cargo
  - go
  - swift
  - terraform
  - aws-cdk
  - maven
  - dotnet
  - dart
  - flutter
  - deno
  - docker-compose
  - helm
  - pulumi
  - ansible
