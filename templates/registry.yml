version: 1

categories:
  - name: system
    description: "System-level package managers"
    templates: [brew-bundle, apt-install, yum-install, pacman-install]

  - name: windows
    description: "Windows package managers"
    templates: [choco-install, scoop-install]

  - name: version_manager
    description: "Runtime version managers"
    templates: [mise-tools, asdf-tools, volta-setup, fnm-setup]

  - name: ruby
    description: "Ruby ecosystem tools"
    templates: [bundle-install, rails-db, version-bump]

  - name: node
    description: "Node.js ecosystem tools"
    templates: [yarn-install, npm-install, pnpm-install, bun-install, prisma-migrate, nextjs-build, vite-build, remix-build, version-bump]

  - name: python
    description: "Python ecosystem tools"
    templates: [pip-install, poetry-install, uv-sync, alembic-migrate, django-migrate, version-bump]

  - name: rust
    description: "Rust ecosystem tools"
    templates: [cargo-build, version-bump, diesel-migrate]

  - name: go
    description: "Go ecosystem tools"
    templates: [go-mod-download, version-bump]

  - name: php
    description: "PHP ecosystem tools"
    templates: [composer-install, laravel-setup, version-bump]

  - name: swift
    description: "Swift ecosystem tools"
    templates: [swift-resolve, version-bump]

  - name: gradle
    description: "Gradle/JVM ecosystem tools"
    templates: [gradle-deps, spring-boot-build]

  - name: elixir
    description: "Elixir ecosystem tools"
    templates: [mix-deps-get, version-bump]

  - name: iac
    description: "Infrastructure as Code tools"
    templates: [terraform-init, cdk-synth, pulumi-install, ansible-install]

  - name: java
    description: "Java ecosystem tools"
    templates: [maven-resolve, version-bump]

  - name: dotnet
    description: ".NET ecosystem tools"
    templates: [dotnet-restore, version-bump]

  - name: kotlin
    description: "Kotlin ecosystem tools"
    templates: [version-bump]

  - name: dart
    description: "Dart/Flutter ecosystem tools"
    templates: [dart-pub-get, flutter-pub-get]

  - name: deno
    description: "Deno ecosystem tools"
    templates: [deno-install]

  - name: containers
    description: "Container and orchestration tools"
    templates: [docker-compose-up, helm-deps]

  - name: common
    description: "Cross-cutting project setup tools"
    templates: [env-copy, pre-commit-install]

  - name: monorepo
    description: "Monorepo and workspace tools"
    templates: [nx-build, turbo-build, lerna-bootstrap]

  - name: install
    description: "Prerequisite installation templates"
    templates:
      - mise-install
      - mise-ruby
      - mise-node
      - mise-python
      - mise-php
      - mise-elixir
      - asdf-ruby
      - asdf-node
      - asdf-python
      - asdf-php
      - asdf-elixir
      - nvm-node
      - fnm-node
      - volta-node
      - rbenv-ruby
      - pyenv-python
      - brew-ruby
      - brew-node
      - brew-python
      - brew-php
      - brew-elixir
      - brew-go
      - brew-install
      - rust-install
      - postgres-install
      - redis-install
      - docker-install

detection_order:
  - brew-bundle
  - choco-install
  - apt-install
  - yum-install
  - pacman-install
  - scoop-install
  - mise-tools
  - asdf-tools
  - volta-setup
  - fnm-setup
  - bundle-install
  - yarn-install
  - npm-install
  - pnpm-install
  - bun-install
  - poetry-install
  - uv-sync
  - pip-install
  - composer-install
  - laravel-setup
  - gradle-deps
  - mix-deps-get
  - cargo-build
  - go-mod-download
  - swift-resolve
  - terraform-init
  - cdk-synth
  - maven-resolve
  - dotnet-restore
  - dart-pub-get
  - flutter-pub-get
  - deno-install
  - docker-compose-up
  - helm-deps
  - pulumi-install
  - ansible-install
  - rails-db
  - prisma-migrate
  - diesel-migrate
  - alembic-migrate
  - nextjs-build
  - vite-build
  - remix-build
  - django-migrate
  - spring-boot-build
  - env-copy
  - pre-commit-install
  - nx-build
  - turbo-build
  - lerna-bootstrap
