name: ansible-install
description: "Install Ansible Galaxy requirements"
category: iac
version: "1.0.0"
platforms: [macos, linux]

detectors: [ansible-project.files]

step:
  title: "Install Ansible requirements"
  description: "Install Ansible Galaxy roles and collections from requirements"
  command: "ansible-galaxy install -r requirements.yml"
  requires:
    - ansible
  precondition:
    type: file_exists
    path: requirements.yml
  completed_check:
    type: command_succeeds
    command: "ansible-galaxy list 2>&1 | grep -q ."
  watches:
    - requirements.yml
    - ansible.cfg

environment_impact:
  note: "Galaxy roles are installed to ~/.ansible/roles"
