name: pulumi-install
description: "Install Pulumi project dependencies"
category: iac
version: "1.0.0"
platforms: [macos, linux, windows]

detectors: [pulumi-project.file]

step:
  title: "Install Pulumi dependencies"
  description: "Install Pulumi plugins and project dependencies"
  command: "pulumi install"
  requires:
    - pulumi
  checks:
    - type: execution
      command: "pulumi plugin ls 2>&1 | grep -q ."
      validation: success
    - type: change
      target: Pulumi.yaml
      on_change: proceed
    - type: change
      target: Pulumi.lock
      on_change: proceed

environment_impact:
  note: "Pulumi plugins are installed to ~/.pulumi/plugins"
