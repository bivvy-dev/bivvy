name: terraform
description: "Initialize Terraform and download providers"
category: iac
version: "1.0.0"
platforms: [macos, linux, windows]

detectors: [terraform.files]

step:
  title: "Initialize Terraform"
  description: "Initialize Terraform working directory and download providers"
  command: "terraform init"
  requires:
    - terraform
  completed_check:
    type: file_exists
    path: ".terraform"
  watches:
    - "*.tf"
    - .terraform.lock.hcl

environment_impact:
  note: "Providers and modules are downloaded to the .terraform directory"
