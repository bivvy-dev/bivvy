name: turbo-build
description: "Set up Turborepo workspace"
category: monorepo
version: "1.0.0"
platforms: [macos, linux, windows]

detectors: [turborepo-project.file]

step:
  title: "Set up Turborepo workspace"
  description: "Install dependencies and build workspace packages"
  command: "npx turbo build"
  requires:
    - node
  checks:
    - type: presence
      target: node_modules/.cache/turbo
    - type: change
      target: turbo.json
      on_change: proceed
    - type: change
      target: "packages/*/package.json"
      on_change: proceed

environment_impact:
  note: "Builds all workspace packages using Turborepo pipeline"
