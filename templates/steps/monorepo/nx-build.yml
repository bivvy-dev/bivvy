name: nx-build
description: "Set up Nx workspace"
category: monorepo
version: "1.0.0"
platforms: [macos, linux, windows]

detectors: [nx-project.file]

step:
  title: "Set up Nx workspace"
  description: "Install dependencies and prepare Nx workspace"
  command: "npx nx reset && npx nx run-many --target=build --all --skip-nx-cache"
  requires:
    - node
  checks:
    - type: presence
      target: node_modules/.cache/nx
    - type: change
      target: nx.json
      on_change: proceed
    - type: change
      target: workspace.json
      on_change: proceed

environment_impact:
  note: "Initializes Nx workspace cache and builds all projects"
