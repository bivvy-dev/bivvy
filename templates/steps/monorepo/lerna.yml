name: lerna
description: "Bootstrap Lerna monorepo"
category: monorepo
version: "1.0.0"
platforms: [macos, linux, windows]

detectors: [lerna-project.file]

step:
  title: "Bootstrap Lerna packages"
  description: "Install and link dependencies across Lerna packages"
  command: "npx lerna bootstrap"
  requires:
    - node
  completed_check:
    type: command_succeeds
    command: "npx lerna list 2>&1 | grep -q ."
  watches:
    - lerna.json
    - "packages/*/package.json"

environment_impact:
  note: "Links inter-package dependencies in the monorepo"
