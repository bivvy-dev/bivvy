name: pip-install
description: "Install Python dependencies using pip"
category: python
version: "1.0.0"
platforms: [macos, linux, windows]

detectors: [requirements-txt-present.file, pyproject-present.file]

step:
  title: "Install Python dependencies"
  description: "Install packages from requirements.txt using pip"
  command: "pip install -r requirements.txt"
  requires:
    - python
  checks:
    - type: execution
      command: "pip check"
      validation: success
    - type: change
      target: requirements.txt
      on_change: proceed

environment_impact:
  note: "Packages are installed to the active Python environment"
