name: version-bump
description: "Bump version in pyproject.toml using bump-my-version"
category: python
version: "1.0.0"
platforms: [macos, linux, windows]

inputs:
  bump:
    description: "Version bump type (patch, minor, major)"
    type: string
    required: true
    prompt:
      question: "Version bump type"
      type: select
      options:
        - label: "Patch (x.y.Z)"
          value: patch
        - label: "Minor (x.Y.0)"
          value: minor
        - label: "Major (X.0.0)"
          value: major

step:
  title: "Bump version"
  description: "Update version in pyproject.toml using bump-my-version"
  requires:
    - python
  command: "bump-my-version bump \"${bump}\" --no-commit --no-tag"

  precondition:
    type: execution
    command: "bump-my-version --help"
    validation: success