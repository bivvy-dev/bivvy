name: django-migrate
description: "Set up a Django application"
category: python
version: "1.0.0"
platforms: [macos, linux, windows]

detectors: [django-project.file]

step:
  title: "Run Django migrations"
  description: "Apply database migrations and collect static files"
  command: "python manage.py migrate"
  requires:
    - python
  precondition:
    type: presence
    target: manage.py
  checks:
    - type: change
      target: manage.py
      on_change: proceed
    - type: change
      target: "*/migrations"
      on_change: proceed

environment_impact:
  note: "Applies pending database migrations"
