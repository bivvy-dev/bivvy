name: uv-sync
description: "Install Python dependencies using uv"
category: python
version: "1.0.0"
platforms: [macos, linux, windows]

detectors: [uv-lockfile.file]

step:
  title: "Install Python dependencies"
  description: "Sync project dependencies using uv"
  command: "uv sync"
  requires:
    - python
  checks:
    - type: presence
      target: .venv
    - type: change
      target: pyproject.toml
      on_change: proceed
    - type: change
      target: uv.lock
      on_change: proceed

environment_impact:
  note: "uv creates a .venv virtual environment in the project"
