name: poetry-install
description: "Install Python dependencies using Poetry"
category: python
version: "1.0.0"
platforms: [macos, linux, windows]

detectors: [poetry-lockfile.file]

step:
  title: "Install Python dependencies"
  description: "Install packages using Poetry"
  command: "poetry install"
  requires:
    - python
  checks:
    - type: execution
      command: "poetry check"
      validation: success
    - type: change
      target: pyproject.toml
      on_change: proceed
    - type: change
      target: poetry.lock
      on_change: proceed

environment_impact:
  note: "Poetry manages a virtual environment for the project"
