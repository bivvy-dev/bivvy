name: alembic-migrate
description: "Run Alembic database migrations"
category: python
version: "1.0.0"
platforms: [macos, linux, windows]

detectors: [alembic-project.files]

step:
  title: "Run Alembic migrations"
  description: "Upgrade database to the latest migration revision"
  command: "alembic upgrade head"
  requires:
    - python
  precondition:
    type: file_exists
    path: "alembic.ini"
  completed_check:
    type: marker
  watches:
    - alembic.ini
    - alembic/versions

environment_impact:
  note: "Applies all pending database migrations up to head"
