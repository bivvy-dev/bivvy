name: deno-install
description: "Cache Deno dependencies"
category: deno
version: "1.0.0"
platforms: [macos, linux, windows]

detectors: [deno-config-present.files]

step:
  title: "Cache Deno dependencies"
  description: "Download and cache project dependencies"
  command: "deno install"
  requires:
    - deno
  checks:
    - type: presence
      target: deno.lock
    - type: change
      target: deno.json
      on_change: proceed
    - type: change
      target: deno.jsonc
      on_change: proceed
    - type: change
      target: deno.lock
      on_change: proceed

environment_impact:
  note: "Dependencies are cached in DENO_DIR (defaults to ~/.cache/deno)"
