name: laravel-setup
description: "Set up a Laravel application"
category: php
version: "1.0.0"
platforms: [macos, linux, windows]

detectors: [laravel-project.file]

step:
  title: "Set up Laravel"
  description: "Copy environment config and generate application key"
  command: "cp -n .env.example .env 2>/dev/null; php artisan key:generate --force"
  requires:
    - php
  checks:
    - type: presence
      target: .env
    - type: change
      target: .env.example
      on_change: proceed

environment_impact:
  note: "Creates .env from .env.example and generates APP_KEY"
