name: flutter-pub-get
description: "Install Flutter dependencies"
category: dart
version: "1.0.0"
platforms: [macos, linux, windows]

detectors: [pubspec-present.file]

step:
  title: "Install Flutter dependencies"
  description: "Install packages and set up Flutter project"
  command: "flutter pub get"
  requires:
    - flutter
  checks:
    - type: presence
      target: .dart_tool
    - type: change
      target: pubspec.yaml
      on_change: proceed
    - type: change
      target: pubspec.lock
      on_change: proceed

environment_impact:
  note: "Packages are cached in ~/.pub-cache"
