name: dart-pub-get
description: "Install Dart dependencies"
category: dart
version: "1.0.0"
platforms: [macos, linux, windows]

detectors: [pubspec-present.file]

step:
  title: "Install Dart dependencies"
  description: "Install packages using dart pub"
  command: "dart pub get"
  requires:
    - dart
  checks:
    - type: presence
      target: .dart_tool
    - type: change
      target: pubspec.yaml
      on_change: proceed
    - type: change
      target: pubspec.lock
      on_change: proceed

environment_impact:
  note: "Packages are cached in ~/.pub-cache"
