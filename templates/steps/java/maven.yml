name: maven
description: "Install Java dependencies using Maven"
category: java
version: "1.0.0"
platforms: [macos, linux, windows]

detects:
  - file: pom.xml

step:
  title: "Install Maven dependencies"
  description: "Download and install project dependencies using Maven"
  command: "mvn dependency:resolve"
  requires:
    - mvn
  completed_check:
    type: file_exists
    path: "target"
  watches:
    - pom.xml

environment_impact:
  note: "Dependencies are downloaded to the local Maven repository (~/.m2)"
