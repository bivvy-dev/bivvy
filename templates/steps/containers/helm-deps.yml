name: helm-deps
description: "Update Helm chart dependencies"
category: containers
version: "1.0.0"
platforms: [macos, linux, windows]

detectors: [helm-project.file]

step:
  title: "Update Helm dependencies"
  description: "Download and update Helm chart dependencies"
  command: "helm dependency update"
  requires:
    - helm
  checks:
    - type: presence
      target: charts
    - type: change
      target: Chart.yaml
      on_change: proceed
    - type: change
      target: Chart.lock
      on_change: proceed

environment_impact:
  note: "Chart dependencies are downloaded to the charts/ directory"
