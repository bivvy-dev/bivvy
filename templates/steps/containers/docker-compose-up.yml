name: docker-compose-up
description: "Start services with Docker Compose"
category: containers
version: "1.0.0"
platforms: [macos, linux, windows]

detectors: [docker-compose-project.files]

step:
  title: "Start Docker Compose services"
  description: "Pull images and start services defined in Compose file"
  command: "docker compose up -d"
  requires:
    - docker
  checks:
    - type: execution
      command: "docker compose ps --status running -q | head -1"
      validation: success
    - type: change
      target: "docker-compose.yml"
      on_change: proceed
    - type: change
      target: "docker-compose.yaml"
      on_change: proceed
    - type: change
      target: compose.yml
      on_change: proceed
    - type: change
      target: compose.yaml
      on_change: proceed

environment_impact:
  note: "Starts background services defined in Docker Compose configuration"
