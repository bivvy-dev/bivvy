name: go-mod-download
description: "Download Go module dependencies"
category: go
version: "1.0.0"
platforms: [macos, linux, windows]

detectors: [go-mod-present.file]

step:
  title: "Download Go dependencies"
  description: "Download module dependencies using go mod"
  command: "go mod download"
  checks:
    - type: execution
      command: "go mod verify"
      validation: success
    - type: change
      target: go.mod
      on_change: proceed
    - type: change
      target: go.sum
      on_change: proceed

environment_impact:
  note: "Modules are cached in $GOPATH/pkg/mod"
