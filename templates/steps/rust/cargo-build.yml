name: cargo-build
description: "Build Rust project using Cargo"
category: rust
version: "1.0.0"
platforms: [macos, linux, windows]

detectors: [cargo-toml-present.file]

step:
  title: "Build Rust project"
  description: "Compile the project and download dependencies using Cargo"
  command: "cargo build"
  requires:
    - rust
  checks:
    - type: presence
      target: target
    - type: change
      target: Cargo.toml
      on_change: proceed
    - type: change
      target: Cargo.lock
      on_change: proceed

environment_impact:
  note: "Build artifacts are placed in the target/ directory"
