name: diesel-migrate
description: "Run Diesel database migrations"
category: rust
version: "1.0.0"
platforms: [macos, linux, windows]

detectors: [diesel-project.file]

step:
  title: "Run Diesel migrations"
  description: "Set up database and run pending migrations"
  command: "diesel setup && diesel migration run"
  requires:
    - diesel
  precondition:
    type: presence
    target: diesel.toml
  checks:
    - type: change
      target: diesel.toml
      on_change: proceed
    - type: change
      target: migrations
      on_change: proceed

environment_impact:
  note: "Creates the database (if needed) and applies pending migrations"
