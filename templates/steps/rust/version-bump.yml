name: version-bump
description: "Bump version in Cargo.toml using cargo-edit"
category: rust
version: "1.0.0"
platforms: [macos, linux, windows]

inputs:
  bump:
    description: "Version bump type (patch, minor, major) or explicit semver string (e.g. 1.5.0)"
    type: string
    required: true

step:
  title: "Bump version"
  description: "Update version in Cargo.toml and Cargo.lock using cargo set-version"
  requires:
    - rust
  precondition:
    type: command_succeeds
    command: "cargo set-version --version"
  command: |
    case "${bump}" in
      patch|minor|major) cargo set-version --bump "${bump}" ;;
      *) cargo set-version "${bump}" ;;
    esac && cargo generate-lockfile
