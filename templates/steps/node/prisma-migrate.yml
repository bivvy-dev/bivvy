name: prisma-migrate
description: "Run Prisma database migrations"
category: node
version: "1.0.0"
platforms: [macos, linux, windows]

detects:
  - file: prisma/schema.prisma

step:
  title: "Run Prisma migrations"
  description: "Apply database migrations and generate Prisma Client"
  command: "npx prisma migrate dev"
  requires:
    - node
  precondition:
    type: file_exists
    path: "prisma/schema.prisma"
  completed_check:
    type: command_succeeds
    command: "npx prisma migrate status 2>&1 | grep -q 'Database schema is up to date'"
  watches:
    - prisma/schema.prisma
    - prisma/migrations

environment_impact:
  note: "Applies pending migrations and regenerates Prisma Client"
