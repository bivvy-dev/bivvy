name: vite
description: "Set up a Vite project"
category: node
version: "1.0.0"
platforms: [macos, linux, windows]

detects:
  - file: vite.config.js
  - file: vite.config.ts
  - file: vite.config.mjs

step:
  title: "Build Vite project"
  description: "Run Vite build to verify configuration"
  command: "npx vite build"
  requires:
    - node
  completed_check:
    type: file_exists
    path: "dist"
  watches:
    - vite.config.js
    - vite.config.ts
    - vite.config.mjs

environment_impact:
  note: "Generates build output in dist directory"
