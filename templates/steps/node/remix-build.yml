name: remix-build
description: "Set up a Remix application"
category: node
version: "1.0.0"
platforms: [macos, linux, windows]

detectors: [remix-project.files]

step:
  title: "Build Remix application"
  description: "Run Remix build to verify setup"
  command: "npx remix build"
  requires:
    - node
  checks:
    - type: presence
      target: build
    - type: change
      target: remix.config.js
      on_change: proceed
    - type: change
      target: remix.config.ts
      on_change: proceed
    - type: change
      target: app/root.tsx
      on_change: proceed

environment_impact:
  note: "Generates server and client build output"
