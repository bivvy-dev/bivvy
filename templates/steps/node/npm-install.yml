name: npm-install
description: "Install Node.js dependencies using npm"
category: node
version: "1.0.0"
platforms: [macos, linux, windows]

detectors: [npm-lockfile.file, package-json-present.file]

step:
  title: "Install Node dependencies"
  description: "Install packages using npm"
  command: "npm install"
  requires:
    - node
  env:
    NODE_ENV: development
  checks:
    - type: presence
      target: node_modules
    - type: change
      target: package.json
      on_change: proceed
    - type: change
      target: "package-lock.json"
      on_change: proceed

environment_impact:
  path_additions:
    - "./node_modules/.bin"
  note: "Node binaries are available in node_modules/.bin"
