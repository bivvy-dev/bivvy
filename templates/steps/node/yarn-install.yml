name: yarn-install
description: "Install Node.js dependencies using Yarn"
category: node
version: "1.0.0"
platforms: [macos, linux, windows]

detectors: [yarn-lockfile.file]

step:
  title: "Install Node dependencies"
  description: "Install packages using Yarn"
  command: "yarn install"
  requires:
    - node
  env:
    NODE_ENV: development
  checks:
    - type: execution
      command: "yarn check --verify-tree"
      validation: success
    - type: change
      target: yarn.lock
      on_change: proceed
    - type: change
      target: package.json
      on_change: proceed

environment_impact:
  path_additions:
    - "./node_modules/.bin"
  note: "Node binaries are available in node_modules/.bin"
