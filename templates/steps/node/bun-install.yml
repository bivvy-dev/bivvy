name: bun-install
description: "Install Node.js dependencies using Bun"
category: node
version: "1.0.0"
platforms: [macos, linux, windows]

detectors: [bun-lockfile.file]

step:
  title: "Install Node dependencies"
  description: "Install packages using Bun"
  command: "bun install"
  requires:
    - node
  checks:
    - type: presence
      target: node_modules
    - type: change
      target: package.json
      on_change: proceed
    - type: change
      target: bun.lockb
      on_change: proceed

environment_impact:
  path_additions:
    - "./node_modules/.bin"
  note: "Node binaries are available in node_modules/.bin"
