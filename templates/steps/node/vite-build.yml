name: vite-build
description: "Set up a Vite project"
category: node
version: "1.0.0"
platforms: [macos, linux, windows]

detectors: [vite-project.files]

step:
  title: "Build Vite project"
  description: "Run Vite build to verify configuration"
  command: "npx vite build"
  requires:
    - node
  checks:
    - type: presence
      target: dist
    - type: change
      target: vite.config.js
      on_change: proceed
    - type: change
      target: vite.config.ts
      on_change: proceed
    - type: change
      target: vite.config.mjs
      on_change: proceed

environment_impact:
  note: "Generates build output in dist directory"
