name: version-bump
description: "Bump version in package.json using npm version"
category: node
version: "1.0.0"
platforms: [macos, linux, windows]

inputs:
  bump:
    description: "Version bump type (patch, minor, major) or explicit semver string (e.g. 1.5.0)"
    type: string
    required: true
    prompt:
      question: "Version bump type"
      type: select
      options:
        - label: "Patch (x.y.Z)"
          value: patch
        - label: "Minor (x.Y.0)"
          value: minor
        - label: "Major (X.0.0)"
          value: major

step:
  title: "Bump version"
  description: "Update version in package.json using npm version"
  requires:
    - node
  precondition:
    type: command_succeeds
    command: "npm --version"
  command: "npm version \"${bump}\" --no-git-tag-version"
