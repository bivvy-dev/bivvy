name: mix-deps-get
description: "Install Elixir dependencies using Mix"
category: elixir
version: "1.0.0"
platforms: [macos, linux, windows]

detectors: [mix-exs-present.file]

step:
  title: "Install Elixir dependencies"
  description: "Download and compile dependencies using Mix"
  command: "mix deps.get"
  requires:
    - elixir
  checks:
    - type: presence
      target: deps
    - type: change
      target: mix.exs
      on_change: proceed
    - type: change
      target: mix.lock
      on_change: proceed

environment_impact:
  note: "Dependencies are installed to the deps directory"
