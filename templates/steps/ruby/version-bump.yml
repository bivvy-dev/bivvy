name: version-bump
description: "Bump version using bump gem"
category: ruby
version: "1.0.0"
platforms: [macos, linux, windows]

inputs:
  bump:
    description: "Version bump type (patch, minor, major) or explicit semver string (e.g. 1.5.0)"
    type: string
    required: true
    prompt:
      question: "Version bump type"
      type: select
      options:
        - label: "Patch (x.y.Z)"
          value: patch
        - label: "Minor (x.Y.0)"
          value: minor
        - label: "Major (X.0.0)"
          value: major

step:
  title: "Bump version"
  description: "Update version using bump gem"
  requires:
    - ruby
  command: "bump \"${bump}\" --no-commit --no-tag"

  precondition:
    type: execution
    command: "gem list -i bump"
    validation: success