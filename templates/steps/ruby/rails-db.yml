name: rails-db
description: "Set up Rails database"
category: ruby
version: "1.0.0"
platforms: [macos, linux, windows]

detectors: [rails-project.files]

step:
  title: "Set up Rails database"
  description: "Create database, run migrations, and seed data"
  command: "bundle exec rails db:prepare"
  requires:
    - ruby
    - bundler
  precondition:
    type: file_exists
    path: "config/database.yml"
  completed_check:
    type: marker
  watches:
    - db/migrate
    - db/seeds.rb
    - config/database.yml

environment_impact:
  note: "Creates and migrates the development database, then seeds it"
