name: rails-db
description: "Set up Rails database"
category: ruby
version: "1.0.0"
platforms: [macos, linux, windows]

detects:
  - file: bin/rails
  - file: config/routes.rb

step:
  title: "Set up Rails database"
  description: "Create database, run migrations, and seed data"
  command: "bin/rails db:prepare"
  requires:
    - ruby
    - bundler
  precondition:
    type: file_exists
    path: "config/database.yml"
  completed_check:
    type: command_succeeds
    command: "bin/rails db:version 2>&1 | grep -q 'Current version'"
  watches:
    - db/migrate
    - db/seeds.rb
    - config/database.yml

environment_impact:
  note: "Creates and migrates the development database, then seeds it"
