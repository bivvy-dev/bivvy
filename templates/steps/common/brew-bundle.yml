name: brew-bundle
description: "Install Homebrew packages from Brewfile"
category: system
version: "1.0.0"
platforms: [macos, linux]

detectors: [brewfile-present.file]

step:
  title: "Install Homebrew packages"
  description: "Install dependencies from Brewfile using Homebrew"
  command: "brew bundle install"
  requires:
    - brew
  checks:
    - type: execution
      command: "brew bundle check"
      validation: success
    - type: change
      target: Brewfile
      on_change: proceed
    - type: change
      target: Brewfile.lock.json
      on_change: proceed

environment_impact:
  modifies_path: true
  shell_files:
    - ~/.zshrc
    - ~/.bashrc
  note: "Some packages may add to PATH via shell config"
