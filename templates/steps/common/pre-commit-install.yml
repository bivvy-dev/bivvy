name: pre-commit-install
description: "Install pre-commit hooks"
category: common
version: "1.0.0"
platforms: [macos, linux]

detectors: [pre-commit-configured.file]

step:
  title: "Install pre-commit hooks"
  description: "Install git hooks defined in .pre-commit-config.yaml"
  command: "pre-commit install"
  requires:
    - pre-commit
  checks:
    - type: presence
      target: ".git/hooks/pre-commit"
    - type: change
      target: ".pre-commit-config.yaml"
      on_change: proceed

environment_impact:
  note: "Installs git hooks that run checks before each commit"
