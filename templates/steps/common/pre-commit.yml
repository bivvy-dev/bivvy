name: pre-commit
description: "Install pre-commit hooks"
category: common
version: "1.0.0"
platforms: [macos, linux]

detects:
  - file: .pre-commit-config.yaml

step:
  title: "Install pre-commit hooks"
  description: "Install git hooks defined in .pre-commit-config.yaml"
  command: "pre-commit install"
  requires:
    - pre-commit
  completed_check:
    type: file_exists
    path: ".git/hooks/pre-commit"
  watches:
    - .pre-commit-config.yaml

environment_impact:
  note: "Installs git hooks that run checks before each commit"
