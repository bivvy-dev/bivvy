name: dotnet-restore
description: "Restore .NET project dependencies"
category: dotnet
version: "1.0.0"
platforms: [macos, linux, windows]

detectors: [dotnet-project.files]

step:
  title: "Restore .NET dependencies"
  description: "Restore NuGet packages for the .NET project"
  command: "dotnet restore"
  requires:
    - dotnet
  checks:
    - type: execution
      command: "dotnet restore --no-restore 2>&1 | grep -q 'Nothing to do"
      validation: success
    - type: change
      target: "*.csproj"
      on_change: proceed
    - type: change
      target: "*.sln"
      on_change: proceed
    - type: change
      target: Directory.Build.props
      on_change: proceed

environment_impact:
  note: "NuGet packages are cached in ~/.nuget/packages"
