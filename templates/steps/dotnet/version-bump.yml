name: version-bump
description: "Bump version in .NET project file (.csproj)"
category: dotnet
version: "1.0.0"
platforms: [macos, linux, windows]

inputs:
  bump:
    description: "Version bump type (patch, minor, major) or explicit semver string (e.g. 1.5.0)"
    type: string
    required: true
    prompt:
      question: "Version bump type"
      type: select
      options:
        - label: "Patch (x.y.Z)"
          value: patch
        - label: "Minor (x.Y.0)"
          value: minor
        - label: "Major (X.0.0)"
          value: major

step:
  title: "Bump version"
  description: "Update Version property in .csproj file"
  command: |
    csproj=$(find . -maxdepth 2 -name '*.csproj' | head -1)
    if [ -z "$csproj" ]; then
      echo "No .csproj file found" >&2; exit 1
    fi
    current=$(grep -oP '<Version>\K[^<]+' "$csproj" 2>/dev/null || echo "0.0.0")
    major=$(echo "$current" | cut -d. -f1)
    minor=$(echo "$current" | cut -d. -f2)
    patch=$(echo "$current" | cut -d. -f3)
    case "${bump}" in
      patch) patch=$((patch + 1)) ;;
      minor) minor=$((minor + 1)); patch=0 ;;
      major) major=$((major + 1)); minor=0; patch=0 ;;
      *) major=$(echo "${bump}" | cut -d. -f1); minor=$(echo "${bump}" | cut -d. -f2); patch=$(echo "${bump}" | cut -d. -f3) ;;
    esac
    new_version="${major}.${minor}.${patch}"
    if grep -q '<Version>' "$csproj"; then
      sed -i.bak "s|<Version>${current}</Version>|<Version>${new_version}</Version>|" "$csproj" && rm -f "${csproj}.bak"
    else
      sed -i.bak "s|</PropertyGroup>|  <Version>${new_version}</Version>\n  </PropertyGroup>|" "$csproj" && rm -f "${csproj}.bak"
    fi

  precondition:
    type: execution
    command: "dotnet --version"
    validation: success