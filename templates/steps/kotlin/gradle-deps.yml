name: gradle-deps
description: "Build project and download dependencies using Gradle"
category: gradle
version: "1.0.0"
platforms: [macos, linux, windows]

detectors: [gradle-project.files]

step:
  title: "Download Gradle dependencies"
  description: "Download project dependencies using the Gradle wrapper"
  command: "./gradlew dependencies"
  requires:
    - java
  checks:
    - type: presence
      target: .gradle
    - type: change
      target: build.gradle.kts
      on_change: proceed
    - type: change
      target: build.gradle
      on_change: proceed
    - type: change
      target: settings.gradle.kts
      on_change: proceed
    - type: change
      target: settings.gradle
      on_change: proceed
    - type: change
      target: gradle.properties
      on_change: proceed

environment_impact:
  note: "Dependencies are cached in ~/.gradle/caches and .gradle/"
