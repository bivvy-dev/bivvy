name: spring-boot-build
description: "Set up a Spring Boot application"
category: gradle
version: "1.0.0"
platforms: [macos, linux, windows]

detectors: [spring-boot-project.files]

step:
  title: "Build Spring Boot application"
  description: "Build the Spring Boot application and run tests"
  command: "./gradlew build -x test"
  requires:
    - java
  checks:
    - type: presence
      target: build/libs
    - type: change
      target: build.gradle.kts
      on_change: proceed
    - type: change
      target: build.gradle
      on_change: proceed
    - type: change
      target: src/main/resources/application.properties
      on_change: proceed
    - type: change
      target: src/main/resources/application.yml
      on_change: proceed

environment_impact:
  note: "Builds application JARs in build/libs directory"
