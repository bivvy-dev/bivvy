name: version-bump
description: "Bump version in build.gradle.kts"
category: kotlin
version: "1.0.0"
platforms: [macos, linux, windows]

inputs:
  bump:
    description: "Version bump type (patch, minor, major) or explicit semver string (e.g. 1.5.0)"
    type: string
    required: true
    prompt:
      question: "Version bump type"
      type: select
      options:
        - label: "Patch (x.y.Z)"
          value: patch
        - label: "Minor (x.Y.0)"
          value: minor
        - label: "Major (X.0.0)"
          value: major

step:
  title: "Bump version"
  description: "Update version in build.gradle.kts or gradle.properties"
  command: |
    if [ -f gradle.properties ] && grep -q '^version=' gradle.properties; then
      version_file="gradle.properties"
      current=$(grep -oP '^version=\K.*' gradle.properties)
    elif [ -f build.gradle.kts ]; then
      version_file="build.gradle.kts"
      current=$(grep -oP 'version\s*=\s*"\K[^"]+' build.gradle.kts)
    else
      echo "No version file found" >&2; exit 1
    fi
    major=$(echo "$current" | cut -d. -f1)
    minor=$(echo "$current" | cut -d. -f2)
    patch=$(echo "$current" | cut -d. -f3)
    case "${bump}" in
      patch) patch=$((patch + 1)) ;;
      minor) minor=$((minor + 1)); patch=0 ;;
      major) major=$((major + 1)); minor=0; patch=0 ;;
      *) major=$(echo "${bump}" | cut -d. -f1); minor=$(echo "${bump}" | cut -d. -f2); patch=$(echo "${bump}" | cut -d. -f3) ;;
    esac
    new_version="${major}.${minor}.${patch}"
    if [ "$version_file" = "gradle.properties" ]; then
      sed -i.bak "s/^version=.*/version=${new_version}/" gradle.properties && rm -f gradle.properties.bak
    else
      sed -i.bak "s/version = \"${current}\"/version = \"${new_version}\"/" build.gradle.kts && rm -f build.gradle.kts.bak
    fi

  precondition:
    type: execution
    command: "test -f build.gradle.kts || test -f gradle.properties"
    validation: success