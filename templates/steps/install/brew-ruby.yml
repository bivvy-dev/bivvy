name: brew-ruby
description: "Install Ruby using Homebrew"
category: install
version: "1.0.0"
platforms: [macos, linux]

step:
  title: "Install Ruby"
  description: "Install Ruby using Homebrew"
  command: "brew install ruby"
  requires:
    - brew
  check:
    type: execution
    command: "ruby --version"
    validation: success

environment_impact:
  modifies_path: true
  note: "Ruby is installed to Homebrew's prefix"
