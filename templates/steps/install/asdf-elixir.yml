name: asdf-elixir
description: "Install Elixir using asdf"
category: install
version: "1.0.0"
platforms: [macos, linux]

step:
  title: "Install Elixir"
  description: "Install the project's Elixir version using asdf"
  command: "asdf plugin add elixir 2>/dev/null; asdf install elixir"
  requires:
    - asdf
  completed_check:
    type: command_succeeds
    command: "asdf where elixir"

environment_impact:
  modifies_path: true
  note: "Elixir is installed to asdf's data directory and activated via shims"
