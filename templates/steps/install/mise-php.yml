name: mise-php
description: "Install PHP using mise"
category: install
version: "1.0.0"
platforms: [macos, linux]

step:
  title: "Install PHP"
  description: "Install the project's PHP version using mise"
  command: "mise install php"
  requires:
    - mise
  completed_check:
    type: command_succeeds
    command: "mise where php"

environment_impact:
  modifies_path: true
  note: "PHP is installed to mise's data directory and activated via shims"
