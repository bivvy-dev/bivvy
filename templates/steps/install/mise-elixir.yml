name: mise-elixir
description: "Install Elixir using mise"
category: install
version: "1.0.0"
platforms: [macos, linux]

step:
  title: "Install Elixir"
  description: "Install the project's Elixir version using mise"
  command: "mise install elixir"
  requires:
    - mise
  check:
    type: execution
    command: "mise where elixir"
    validation: success

environment_impact:
  modifies_path: true
  note: "Elixir is installed to mise's data directory and activated via shims"
