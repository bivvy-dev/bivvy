name: asdf-php
description: "Install PHP using asdf"
category: install
version: "1.0.0"
platforms: [macos, linux]

step:
  title: "Install PHP"
  description: "Install the project's PHP version using asdf"
  command: "asdf plugin add php 2>/dev/null; asdf install php"
  requires:
    - asdf
  check:
    type: execution
    command: "asdf where php"
    validation: success

environment_impact:
  modifies_path: true
  note: "PHP is installed to asdf's data directory and activated via shims"
