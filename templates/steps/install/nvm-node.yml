name: nvm-node
description: "Install Node.js using nvm"
category: install
version: "1.0.0"
platforms: [macos, linux]

step:
  title: "Install Node.js"
  description: "Install the project's Node.js version using nvm"
  command: "nvm install"
  requires:
    - nvm
  completed_check:
    type: command_succeeds
    command: "node --version"

environment_impact:
  modifies_path: true
  note: "Node.js is installed to ~/.nvm/versions and activated via nvm shell integration"
