name: asdf-python
description: "Install Python using asdf"
category: install
version: "1.0.0"
platforms: [macos, linux]

step:
  title: "Install Python"
  description: "Install the project's Python version using asdf"
  command: "asdf plugin add python 2>/dev/null; asdf install python"
  requires:
    - asdf
  completed_check:
    type: command_succeeds
    command: "asdf where python"

environment_impact:
  modifies_path: true
  note: "Python is installed to asdf's data directory and activated via shims"
