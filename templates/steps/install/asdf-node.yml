name: asdf-node
description: "Install Node.js using asdf"
category: install
version: "1.0.0"
platforms: [macos, linux]

step:
  title: "Install Node.js"
  description: "Install the project's Node.js version using asdf"
  command: "asdf plugin add nodejs 2>/dev/null; asdf install nodejs"
  requires:
    - asdf
  check:
    type: execution
    command: "asdf where nodejs"
    validation: success

environment_impact:
  modifies_path: true
  note: "Node.js is installed to asdf's data directory and activated via shims"
