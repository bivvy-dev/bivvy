name: fnm-node
description: "Install Node.js using fnm"
category: install
version: "1.0.0"
platforms: [macos, linux, windows]

detectors: [fnm-installed.command]

step:
  title: "Install Node.js via fnm"
  description: "Install the project's required Node.js version using fnm"
  command: "fnm install && fnm use"
  requires:
    - fnm
  checks:
    - type: execution
      command: "fnm current 2>&1 | grep -v 'none"
      validation: success
    - type: change
      target: .nvmrc
      on_change: proceed
    - type: change
      target: ".node-version"
      on_change: proceed

environment_impact:
  modifies_path: true
  shell_files:
    - ~/.zshrc
    - ~/.bashrc
  note: "Installs Node.js and sets the active version via fnm"
