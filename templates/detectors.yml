detectors:
  # --- Tool installation detectors (*-installed) ---

  ruby-installed:
    command: "ruby -v"
  bundler-installed:
    command: "bundle -v"
  node-installed:
    command: "node -v"
  yarn-installed:
    command: "yarn -v"
  pnpm-installed:
    command: "pnpm -v"
  bun-installed:
    command: "bun --version"
  npm-installed:
    command: "npm -v"
  python-installed:
    command: "python3 --version"
  pip-installed:
    command: "pip --version"
  poetry-installed:
    command: "poetry --version"
  uv-installed:
    command: "uv --version"
  rust-installed:
    command: "rustc --version"
  cargo-installed:
    command: "cargo --version"
  go-installed:
    command: "go version"
  php-installed:
    command: "php -v"
  composer-installed:
    command: "composer --version"
  elixir-installed:
    command: "elixir --version"
  mix-installed:
    command: "mix --version"
  swift-installed:
    command: "swift --version"
  java-installed:
    command: "java --version"
  dotnet-installed:
    command: "dotnet --version"
  dart-installed:
    command: "dart --version"
  flutter-installed:
    command: "flutter --version"
  deno-installed:
    command: "deno --version"
  gradle-installed:
    command: "gradle --version"
  rails-installed:
    command: "rails -v"
  django-installed:
    command: "django-admin --version"
  terraform-installed:
    command: "terraform -v"
  docker-installed:
    command: "docker --version"
  docker-compose-installed:
    command: "docker compose version"
  helm-installed:
    command: "helm version"
  pulumi-installed:
    command: "pulumi version"
  ansible-installed:
    command: "ansible --version"
  diesel-installed:
    command: "diesel --version"
  pre-commit-installed:
    command: "pre-commit --version"
  brew-installed:
    command: "brew --version"
  mise-installed:
    command: "mise --version"
  asdf-installed:
    command: "asdf --version"
  fnm-installed:
    command: "fnm --version"
  volta-installed:
    command: "volta --version"
  apt-installed:
    command: "apt --version"
  yum-installed:
    command: "yum --version"
  pacman-installed:
    command: "pacman --version"
  chocolatey-installed:
    command: "choco --version"
  scoop-installed:
    command: "scoop --version"

  # --- Project/file presence detectors ---

  gemfile-present:
    file: Gemfile
  brewfile-present:
    file: Brewfile
  package-json-present:
    file: package.json
  yarn-lockfile:
    file: yarn.lock
  npm-lockfile:
    file: package-lock.json
  pnpm-lockfile:
    file: pnpm-lock.yaml
  bun-lockfile:
    file: bun.lockb
  poetry-lockfile:
    file: poetry.lock
  uv-lockfile:
    file: uv.lock
  pyproject-present:
    file: pyproject.toml
  requirements-txt-present:
    file: requirements.txt
  setup-py-present:
    file: setup.py
  cargo-toml-present:
    file: Cargo.toml
  go-mod-present:
    file: go.mod
  composer-json-present:
    file: composer.json
  mix-exs-present:
    file: mix.exs
  package-swift-present:
    file: Package.swift
  pom-xml-present:
    file: pom.xml
  pubspec-present:
    file: pubspec.yaml
  deno-config-present:
    files:
      json: deno.json
      jsonc: deno.jsonc
  gradle-project:
    files:
      kts: build.gradle.kts
      groovy: build.gradle
  dotnet-project:
    files:
      sln: "*.sln"
      csproj: "*.csproj"
  rails-project:
    files:
      application: config/application.rb
      database: config/database.yml
  django-project:
    file: manage.py
  spring-boot-project:
    files:
      properties: src/main/resources/application.properties
      yml: src/main/resources/application.yml
  nextjs-project:
    files:
      js: next.config.js
      mjs: next.config.mjs
      ts: next.config.ts
  vite-project:
    files:
      js: vite.config.js
      ts: vite.config.ts
      mjs: vite.config.mjs
  remix-project:
    files:
      js: remix.config.js
      ts: remix.config.ts
      root: app/root.tsx
  laravel-project:
    file: artisan
  terraform-project:
    files:
      main: main.tf
      terraform: terraform.tf
      versions: versions.tf
  docker-compose-project:
    files:
      compose: compose.yml
      compose_yaml: compose.yaml
      docker_compose: docker-compose.yml
      docker_compose_yaml: docker-compose.yaml
  helm-project:
    file: Chart.yaml
  pulumi-project:
    file: Pulumi.yaml
  ansible-project:
    files:
      cfg: ansible.cfg
      playbook: playbook.yml
      playbook_yaml: playbook.yaml
      site: site.yml
      site_yaml: site.yaml
  aws-cdk-project:
    file: cdk.json
  prisma-project:
    file: prisma/schema.prisma
  diesel-project:
    file: diesel.toml
  alembic-project:
    files:
      ini: alembic.ini
      env: alembic/env.py
  pre-commit-configured:
    file: .pre-commit-config.yaml
  env-template-present:
    files:
      example: .env.example
      sample: .env.sample
      template: .env.template
  nx-project:
    file: nx.json
  turborepo-project:
    file: turbo.json
  lerna-project:
    file: lerna.json
  mise-configured:
    files:
      toml: .mise.toml
      alt: mise.toml
  asdf-configured:
    file: .tool-versions
  nvmrc-present:
    file: .nvmrc
  node-version-present:
    file: .node-version
